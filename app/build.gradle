plugins {
    id 'com.android.application'
}

android {
    namespace 'com.shizy.wakebridge'
    compileSdk 34

    defaultConfig {
        applicationId 'com.shizy.wakebridge'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
